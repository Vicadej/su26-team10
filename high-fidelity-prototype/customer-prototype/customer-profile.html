<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <nav class="navbar">
        <span class="logo">MealPrep Match</span>
        <div class="nav-links">
            <a href="customer-dashboard.html">Browse</a>
            <a href="customer-subscriptions.html">My Subscriptions</a>
            <a href="customer-profile.html">Profile</a>
            <a href="customer-reviews.html">Reviews</a>
            <a href="index.html">Log Out</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <h3>My Profile</h3>

        <div class="profile-card">
            <label>Full Name</label>
            <p class="profile-field" data-field="name">Lebron James</p>

            <label>Email</label>
            <p class="profile-field" data-field="email">lebron@example.com</p>

            <label>Phone Number</label>
            <p class="profile-field" data-field="phone">(555) 123-4567</p>

            <label>Dietary Preference</label>
            <p class="profile-field" data-field="diet">Carnivore</p>

            <button id="profile-edit-btn" class="register-btn">Edit Profile</button>
        </div>
    </div>

    <script>
        const PROFILE_KEY = 'mealprep-profile';
        const editBtn = document.getElementById('profile-edit-btn');
        const fields = document.querySelectorAll('.profile-field');

        const saved = JSON.parse(localStorage.getItem(PROFILE_KEY) || '{}');
        fields.forEach(field => {
            if (saved[field.dataset.field]) field.textContent = saved[field.dataset.field];
        });

        editBtn.addEventListener('click', () => {
            const editing = editBtn.textContent === 'Save Profile';

            if (editing) {
                const profile = {};
                fields.forEach(field => {
                    field.contentEditable = 'false';
                    profile[field.dataset.field] = field.textContent.trim();
                });
                localStorage.setItem(PROFILE_KEY, JSON.stringify(profile));
                editBtn.textContent = 'Edit Profile';
            } else {
                fields.forEach(field => field.contentEditable = 'true');
                fields[0].focus();
                editBtn.textContent = 'Save Profile';
            }
        });
    </script>
</body>
</html>
