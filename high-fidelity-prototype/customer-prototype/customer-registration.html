<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class= "customer-form">
        <h3>Register as a Customer</h3>
        <p>create a free account or <a href="customer-login.html">log in</a></p>

        <form>
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="e.g. Lebron James!!">

            <label for="email">Email</label>
            <input type="text" id="email" placeholder="e.g. coffeemachine@gmail.com">

            <label for="password">Password</label>
            <input type="text" id="password" placeholder="e.g. password">

            <button type="submit" class="register-btn">Register</button>
        </form>

    </div>

    <div class="back-link">
        <a href="#">back</a>
    </div>
</body>
</html>
