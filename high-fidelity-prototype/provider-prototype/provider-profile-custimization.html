<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Profile Customization</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard">
    <nav class="nav">
        <a href="dashboard.html"><button>Dashboard</button></a>
        <a href="#"><button>Uploads</button></a>
        <a href="provider-profile.html"><button>Profile</button></a>
        <a href="#"><button>Log Out</button></a>
    </nav>

    <main class="main">
        <!-- Profile header: avatar, name, rating, edit -->
        <div class="profile-header">
            <div class="avatar">
                <span class="avatar-placeholder">+</span>
            </div>
            <div class="profile-identity">
                <h1>Green Kitchen Co.</h1>
                <div class="rating">
                    <span class="stars">&#9733;&#9733;&#9733;&#9733;&#9734;</span>
                    <span class="rating-value">4.2 / 5</span>
                    <span class="rating-count">(128 reviews)</span>
                </div>
            </div>
            <a href="provider-profile.html"><button class="edit-btn">Save Profile</button></a>
        </div>

        <!-- Mission statement -->
        <div class="profile-section">
            <h4>Description</h4>
            <div class="profile-card">
                <textarea class="profile-input" id="description" rows="4" placeholder="Tell customers what you're about and the types of items you make..."></textarea>
            </div>
        </div>

        <!-- Specialties / tags -->
        <div class="profile-section">
            <h4>Specialties</h4>
            <div class="profile-card">
                <div class="tag-list">
                    <span class="tag">Vegan Friendly</span>
                    <span class="tag">Meal Plans</span>
                    <span class="tag">Recipes</span>
                    <span class="tag">Carnivore Diet</span>
                    <span class="tag">Meal Kits</span>
                    <button class="tag-add" title="Add specialty">+</button>
                </div>
            </div>
        </div>

        <!-- Content -->
        <div class="profile-section">
            <h4>Content</h4>
            <div class="profile-card">
                <div class="content-grid"></div>
            </div>
        </div>
    </main>
</body>
</html>
