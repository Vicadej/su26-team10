<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class= "provider-form">
        <h3>Register as a Provider</h3>
        <p>create a free account or <a href="provider-login.html">log in</a></p>


        <form action="dashboard.html" method="get">
            <label for="organization">Organization Name</label>
            <input type="text" id="org" placeholder="e.g. The Carrot Cart">

            <label for="email">Email</label>
            <input type="text" id="email" placeholder="e.g. sillygoose@gmail.com">

            <label for="password">Password</label>
            <input type="text" id="password" placeholder="e.g. dogsandcats1234">

            <button type="submit" class="register-btn">Register</button>
        </form>

    </div>

    <div class="back-link">
        <a href="#">back</a>
    </div>
</body>
</html>
